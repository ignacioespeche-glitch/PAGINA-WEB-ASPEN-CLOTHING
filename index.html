    <!-- Script de Control de Scroll y Navegación para Aspen -->
    <script>
      // 1. Control del fondo gris del header al bajar
      window.addEventListener('scroll', () => {
        const header = document.querySelector('.main-header');
        if (header) {
          if (window.scrollY > 10) {
            header.classList.add('scrolled');
          } else {
            header.classList.remove('scrolled');
          }
        }
      });

      // 2. Control automático de Scroll To Top y disparo de eventos Analytics al cambiar de sección
      document.addEventListener('click', (e) => {
        const esEnlace = e.target.closest('a') || e.target.closest('.tarjeta-destacada') || e.target.closest('.tarjeta-categoria') || e.target.closest('.boton-explorar');
        if (esEnlace) {
          setTimeout(() => {
            window.scrollTo({ top: 0, behavior: 'instant' });
            
            if (typeof gtag === 'function') {
              gtag('event', 'page_view', {
                page_path: window.location.pathname + window.location.search,
                page_title: document.title
              });
            }
          }, 80);
        }
      });
    </script>
